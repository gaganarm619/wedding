<!DOCTYPE html>
<html>
<head>
<title>Our Wedding</title>

<style>
/* General Page Setup */
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  text-align: center;
  position: relative;
  color: white;
}

body::before {
  content: "";
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: url("KUM05401.jpg") center/cover no-repeat;
  filter: blur(0.5px) brightness(80%);
  z-index: -1;
}

/* Floating hearts */
.heart {
  position: fixed;
  bottom: -20px;
  font-size: 20px;
  animation: float 8s linear infinite;
  color: red;
  z-index: 1;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

/* Hero section */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-shadow: 2px 2px 10px black;
  animation: fadeIn 3s;
}

.hero h1 { 
  font-size: 60px; 
  margin-bottom: 5px;
  animation: zoom 3s infinite alternate;
}

@keyframes zoom {
  from { transform: scale(1); }
  to { transform: scale(1.05); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.countdown {
  font-size: 25px;
  background: rgba(0,0,0,0.5);
  padding: 15px 30px;
  border-radius: 50px;
  margin-top: 20px;
}

/* Events container */
.events-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 25px;
  padding: 40px 20px;
}

.event-card {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.3);
  padding: 15px;
  border-radius: 20px;
  width: 280px;
  cursor: pointer;
  transition: 0.4s;
  overflow: hidden;
}

.event-card:hover {
  background: #ff4d6d;
  transform: translateY(-10px);
}

.event-card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 15px;
  margin-bottom: 15px;
}

/* MODAL STYLES */
.modal {
  display: none; 
  position: fixed;
  z-index: 1000;
  left: 0; top: 0; width: 100%; height: 100%;
  background-color: rgba(0,0,0,0.9);
}

.modal-content {
  position: relative;
  margin: 5% auto;
  width: 85%;
  max-width: 600px;
  border-radius: 20px;
  overflow: hidden;
  background-size: cover;
  background-position: center;
  box-shadow: 0 0 35px rgba(255, 77, 109, 0.6);
}

.modal-overlay {
  background: rgba(0, 0, 0, 0.75);
  padding: 50px 30px;
  text-shadow: 2px 2px 10px black;
}

.close {
  position: absolute;
  right: 20px; top: 10px;
  color: white;
  font-size: 40px;
  font-weight: bold;
  cursor: pointer;
  z-index: 1001;
}

footer {
  background: rgba(0,0,0,0.8);
  padding: 25px;
  margin-top: 50px;
}
</style>
</head>

<body>

<div class="heart" style="left:10%">❤️</div>
<div class="heart" style="left:50%">💖</div>
<div class="heart" style="left:90%">💕</div>

<div class="hero">
  <h1>Druv ❤️ Rashmi</h1>
  <h2>Wedding Events</h2>
  <div class="countdown" id="countdown"></div>
</div>

<section>
  <div class="events-container">

    <div class="event-card" onclick="openEvent('Mehandi', 'April 30, 2026', '6:00 PM', 'Bride Residence', 'Mehandi.jpg.jpeg')">
      <img src="C:\Users\gagan\OneDrive\Desktop\Invitation\Mehandi.jpg.jpeg" alt="Mehandi">
      <h3>Mehandi</h3>
    </div>

    <div class="event-card" onclick="openEvent('Bangles Ceremony', 'May 1, 2026', '9:00 AM', 'Bride Residence', 'Bale.jpg.jpeg')">
      <img src="C:\Users\gagan\OneDrive\Desktop\Invitation\Bale.jpg.jpeg" alt="Bale Shastra">
      <h3>Bangles Ceremony</h3>
    </div>

    <div class="event-card" onclick="openEvent('Haldi', 'May 1, 2026', '7:00 PM', 'Bride Residence', 'Haldi.jpg')">
      <img src="Haldi.jpg" alt="Haldi">
      <h3>Haldi</h3>
    </div>

    <div class="event-card" onclick="openEvent('Engagement', 'May 3, 2026', '7:35 PM', 'Mallur: Veerabhadreshwara Kalyana Mantapa', 'engagement.jpg.jpeg')">
      <img src="engagement.jpg.jpeg" alt="Engagement">
      <h3>Engagement</h3>
    </div>

    <div class="event-card" onclick="openEvent('Muhurtham', 'May 4, 2026', '9:00 - 10:35 AM', 'Mallur: Veerabhadreshwara Kalyana Mantapa', 'Muhurtham.jpg.jpeg')">
      <img src="C:\Users\gagan\OneDrive\Desktop\Invitation\Muhurtham.jpg.jpeg" alt="Muhurtham">
      <h3>Muhurtham</h3>
    </div>

    <div class="event-card" onclick="openEvent('Reception', 'May 6, 2026', '12:00 PM', 'Kumarapattanam: Balehalli Veerasimhasana Mangala Mantapa', 'Reception.jpg.jpeg')">
      <img src="Reception.jpg.jpeg" alt="Reception">
      <h3>Reception</h3>
    </div>

  </div>
</section>

<div id="eventModal" class="modal">
  <div class="modal-content" id="modalBg">
    <span class="close" onclick="closeModal()">&times;</span>
    <div class="modal-overlay">
      <h1 id="modalTitle"></h1>
      <hr style="width: 50%; border: 0.5px solid rgba(255,255,255,0.3); margin: 20px auto;">
      <p style="font-size: 22px;">📅 <span id="modalDate"></span></p>
      <p style="font-size: 22px;">⏰ <span id="modalTime"></span></p>
      <p style="font-size: 22px;">📍 <span id="modalVenue"></span></p>
    </div>
  </div>
</div>

<footer>Made with ❤️ for our special day</footer>

<script>
function openEvent(title, date, time, venue, bg) {
  document.getElementById("modalTitle").innerText = title;
  document.getElementById("modalDate").innerText = date;
  document.getElementById("modalTime").innerText = time;
  document.getElementById("modalVenue").innerText = venue;
  document.getElementById("modalBg").style.backgroundImage = "url('" + bg + "')";
  document.getElementById("eventModal").style.display = "block";
}

function closeModal() {
  document.getElementById("eventModal").style.display = "none";
}

window.onclick = function(event) {
  if (event.target == document.getElementById("eventModal")) { closeModal(); }
}

var weddingDate = new Date("May 4, 2026 10:00:00").getTime();
setInterval(function() {
  var now = new Date().getTime();
  var distance = weddingDate - now;
  var d = Math.floor(distance / (1000 * 60 * 60 * 24));
  var h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  var s = Math.floor((distance % (1000 * 60)) / 1000);
  document.getElementById("countdown").innerHTML = d + " Days " + h + " Hours " + m + " Min " + s + " Sec";
}, 1000);
</script>

</body>
</html>
